# /etc/nginx/sites-available/chinanna
# Reverse-proxy nginx -> gunicorn (127.0.0.1:8000).
# Sau khi chạy certbot, khối server 443 + redirect 80->443 sẽ được certbot tự thêm.
# Đổi server_name thành domain thật của bạn (vd chinanna.duckdns.org).

server {
    listen 80;
    server_name chinanna.duckdns.org;

    # Upload giấy tờ tối đa 15MB (chừa dư -> 20MB)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
